worker_processes 1;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;

  server {
    listen 80;
    server_name _;
    root /app/dist/client;
    index index.html;

    # Backend API proxy (matches Vite dev proxy behavior in production)
    location /rest/api/ {
      proxy_pass https://test-100.ecotec-digital.de;
      proxy_http_version 1.1;
      proxy_set_header Host test-100.ecotec-digital.de;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_ssl_server_name on;
    }

    location = /rest/api {
      proxy_pass https://test-100.ecotec-digital.de;
      proxy_http_version 1.1;
      proxy_set_header Host test-100.ecotec-digital.de;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_ssl_server_name on;
    }

    # Serve static files directly, otherwise proxy to Node (SSR/API)
    location / {
      try_files $uri @node;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location @node {
      proxy_pass http://127.0.0.1:3000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
